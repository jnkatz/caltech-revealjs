title: Caltech Revealjs
author: Jonathan N. Katz
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, caltech-theme.scss]
      css: caltech-custom.css
      width: 1280
      height: 720
      margin: 0.04
      slide-number: c/t
      embed-resources: true
      html-math-method: katex
      self-contained-math: true
      highlight-style: github
      code-line-numbers: false
      code-overflow: wrap
      title-slide-attributes:
        data-background-color: "#FFF0E7"
      date-format: "MMMM D, YYYY"
      template-partials:
        - title-slide.html
      filters:
        - logo-inject.lua
      knitr:
        opts_chunk:
          echo: true
          collapse: false
          cache: true
          out.width: "70%"
          fig.align: center
          fig.width: 6
          fig.height: 3.708
          fig.retina: 3
          fig.show: hold
          warning: false
          message: false
          tidy: false
          fig.showtext: true
